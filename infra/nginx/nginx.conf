# Dynamically set API upstream from env vars (evaluated by envsubst at startup)
# API_HOST and API_PORT are injected from the nginx container environment.
# For runtime substitution: envsubst < /etc/nginx/conf.d/default.conf > /tmp/nginx.conf
# and nginx uses /tmp/nginx.conf. We use a variable workaround instead:

# Upstream definitions are not variable-friendly; use proxy_pass with resolver.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Docker embedded DNS — re-resolve hostnames every 10s so container
    # recreations (e.g., Dokploy deploys) are picked up immediately.
    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 10M;
    proxy_read_timeout 60s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;

    # Health check endpoint
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # === API routes — proxy to external backend (preserve full /api/v1/... path) ===
    location /api/ {
        # Resolve API at runtime from env vars via a variable trick
        # Nginx variables are lazily evaluated and bypass startup validation.
        set $api_host "185.215.165.2";
        set $api_port "3001";
        proxy_pass http://$api_host:$api_port;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth endpoints — extra rate limiting (narrower match, inside /api/)
    location /api/auth/ {
        set $api_host "185.215.165.2";
        set $api_port "3001";
        proxy_pass http://$api_host:$api_port;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === WebSocket support ===
    location /ws/ {
        set $api_host "185.215.165.2";
        set $api_port "3001";
        proxy_pass http://$api_host:$api_port;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === Frontend SPA (web container, same Docker network) ===
    # Using a variable forces nginx to re-resolve via the resolver above
    # whenever the web container is recreated by Dokploy.
    location / {
        set $web_host web;
        proxy_pass http://$web_host:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
