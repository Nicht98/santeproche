# Kannel configuration for SanteProche
# Minimal working config for local dev / testing with fake SMSC
# Replace with real SMPP credentials for production

group = core
admin-port = 13000
smsbox-port = 13001
log-file = /dev/stdout
log-level = 0

# Fake SMSC for local dev — accepts messages but doesn't send real SMS
group = smsc
smsc = fake
smsc-id = test-sms

# SMSBox — HTTP API for sending SMS
group = smsbox
bearerbox-host = localhost
sendsms-port = 13013

# Sending user credentials for /cgi-bin/sendsms
group = sendsms-user
username = santeproche
password = APP_SECRET
# default-smsc =

# In production uncomment below and comment out fake SMSc above
# group = smsc
# smsc = smpp
# smsc-id = mtn_cameroon
