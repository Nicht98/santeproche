version: "3.8"

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://sante:secret@db:5432/santeproche
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - JWT_SECRET=dev-jwt-secret-change-in-prod
      - OSRM_URL=http://osrm-routed:5000
      - NOMINATIM_URL=http://nominatim:8080
      - KANNEL_URL=http://kannel:13013
    depends_on:
      - db
      - redis
      - minio
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER: sante
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: santeproche
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  nominatim:
    image: mediagis/nominatim:4.4
    environment:
      PBF_URL: "https://download.geofabrik.de/africa/cameroon-latest.osm.pbf"
      REPLICATION_URL: "https://download.geofabrik.de/africa/cameroon-updates/"
    ports:
      - "8080:8080"
    volumes:
      - nominatim_data:/var/lib/postgresql/14/main

  osrm-extract:
    image: osrm/osrm-backend:latest
    command: >
      bash -c "
        wget -O /data/cameroon.osm.pbf https://download.geofabrik.de/africa/cameroon-latest.osm.pbf &&
        osrm-extract -p /opt/car.lua /data/cameroon.osm.pbf &&
        osrm-partition /data/cameroon.osrm &&
        osrm-customize /data/cameroon.osrm
      "
    volumes:
      - osrm_data:/data

  osrm-routed:
    image: osrm/osrm-backend:latest
    command: osrm-routed --algorithm mld /data/cameroon.osrm
    ports:
      - "5000:5000"
    volumes:
      - osrm_data:/data
    depends_on:
      - osrm-extract

  kannel:
    image: tobias74/kannel:latest
    ports:
      - "13013:13013"
      - "13000:13000"
    volumes:
      - ./infra/kannel/kannel.conf:/etc/kannel/kannel.conf
    environment:
      KANNEL_ADMIN_PASSWORD: admin-secret

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: grafana-secret

volumes:
  pg_data:
  minio_data:
  nominatim_data:
  osrm_data:
