services:
  # ===========================================
  #   FRONTEND WEB SERVER (nginx serving SPA)
  # ===========================================
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        VITE_API_URL: ${BACKEND_URL:-http://185.215.165.2:3001/api/v1}
    expose:
      - "80"
    ports:
      - "8090:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
