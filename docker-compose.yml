services:
  # ===========================================
  #   FRONTEND ONLY — SPA served via Nginx
  #   Build with VITE_API_URL pointing at deployed backend
  #   No host port binding — exposed internally for proxy
  # ===========================================
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    expose:
      - "80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
